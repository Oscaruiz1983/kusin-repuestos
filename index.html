<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kusin Repuestos</title>

<script src="https://sdk.mercadopago.com/js/v2"></script>

<style>
body { margin:0; font-family:Arial; background:#fff; }
header { background:black; color:white; padding:20px; text-align:center; font-size:24px; }
.products { display:flex; justify-content:center; gap:20px; padding:20px; }
.card { border:1px solid #ccc; padding:20px; width:200px; text-align:center; }
button { background:black; color:white; border:none; padding:10px; cursor:pointer; }
</style>
</head>

<body>

<header>Kusin Repuestos</header>

<section class="products">

<div class="card">
<h3>Filtro de aceite</h3>
<p>$10.000</p>
<button onclick="pagar()">Comprar</button>
</div>

<div class="card">
<h3>Pastillas de freno</h3>
<p>$25.000</p>
<button onclick="pagar()">Comprar</button>
</div>

</section>

<script>
function pagar(){
    alert("Pago en modo prueba funcionando 🚀");
}
</script>

</body>
</html>
