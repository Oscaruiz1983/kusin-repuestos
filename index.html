<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kusin Repuestos</title>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    body { margin:0; font-family: Arial; }
    header { background:#000; color:#fff; padding:15px; display:flex; justify-content:space-between; }
    nav span { cursor:pointer; }
    .banner { background:#111; color:#fff; text-align:center; padding:40px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
    .card { border:1px solid #ddd; padding:20px; }
    button { padding:10px; background:black; color:white; border:none; cursor:pointer; }

    #cartPanel {
      position:fixed; right:-350px; top:0; width:350px; height:100%;
      background:#fff; border-left:2px solid black; padding:20px; transition:0.3s;
    }
    #cartPanel.open { right:0; }
  </style>
</head>
<body>

<header>
  <h1>Kusin Repuestos</h1>
  <nav>
    <span id="cartBtn">🛒 (<span id="count">0</span>)</span>
  </nav>
</header>

<section class="banner">
  <h2>Tienda de Repuestos</h2>
</section>

<section class="grid">
  <div class="card">
    <h3>Filtro de Aceite</h3>
    <p>$9990</p>
    <button onclick="add('Filtro',9990)">Agregar</button>
  </div>
  <div class="card">
    <h3>Pastillas de Freno</h3>
    <p>$24990</p>
    <button onclick="add('Freno',24990)">Agregar</button>
  </div>
</section>

<div id="cartPanel">
  <h2>Carrito</h2>
  <div id="items"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="pagar()">Pagar</button>
</div>

<script>
let cart = [];

function add(name, price){
  cart.push({name, price});
  render();
}

function render(){
  document.getElementById('count').innerText = cart.length;
  let html=''; let total=0;
  cart.forEach(p=>{ total+=p.price; html+=`<p>${p.name} - $${p.price}</p>`; });
  document.getElementById('items').innerHTML = html;
  document.getElementById('total').innerText = total;
}

// abrir carrito
cartBtn.onclick = ()=> cartPanel.classList.toggle('open');

// simulación pago
function pagar(){
  if(cart.length === 0){
    alert('El carrito está vacío');
    return;
  }

  // Simulación Checkout MercadoPago (modo TEST)
  alert('Redirigiendo a MercadoPago (modo prueba) 🔥');

  // En integración real se necesita backend para generar preferencia
  // Por ahora abrimos link de ejemplo
  window.open('https://www.mercadopago.cl/checkout/v1/redirect?pref_id=TEST', '_blank');
}
</script>

</body>
</html>
